<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubliMarches - Optimiseur Escaliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">SubliMarches</h1>
            <p class="text-xl text-gray-600">Suite d'outils pour l'optimisation d'escaliers</p>
        </header>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- App 1 -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-3 text-blue-600">1. Saisie Mesures</h2>
                <p class="text-gray-600 mb-4">Mesurez et configurez votre escalier</p>
                <a href="app1-mesures/" 
                   class="block w-full bg-blue-600 text-white text-center py-2 rounded hover:bg-blue-700">
                    Commencer
                </a>
            </div>

            <!-- App 2 -->
            <div class="bg-white p-6 rounded-lg shadow-md opacity-75">
                <h2 class="text-xl font-semibold mb-3 text-green-600">2. Contremarches</h2>
                <p class="text-gray-600 mb-4">Optimisation découpe contremarches</p>
                <button class="w-full bg-gray-400 text-white py-2 rounded cursor-not-allowed">
                    Bientôt disponible
                </button>
            </div>

            <!-- App 3 -->
            <div class="bg-white p-6 rounded-lg shadow-md opacity-75">
                <h2 class="text-xl font-semibold mb-3 text-purple-600">3. Dessus Marches</h2>
                <p class="text-gray-600 mb-4">Optimisation découpe dessus</p>
                <button class="w-full bg-gray-400 text-white py-2 rounded cursor-not-allowed">
                    Bientôt disponible
                </button>
            </div>
        </div>
    </div>
</body>
</html>
